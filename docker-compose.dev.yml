version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: ["air", "-c", ".air.toml"]
    environment:
      - PORT=8080
      - TRANSLATION_PATH=/app/web/public/data/translations
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-}
      - GITHUB_WORKFLOW_FILE=${GITHUB_WORKFLOW_FILE:-sync-translations-from-deploy.yml}
      - GITHUB_WORKFLOW_REF=${GITHUB_WORKFLOW_REF:-main}
      - TRANSLATOR_ACCOUNTS=${TRANSLATOR_ACCOUNTS:-}
      - JWT_SECRET=${JWT_SECRET:-dev-translate-secret}
      - REDIS_URL=${REDIS_URL:-localhost:6379}
    volumes:
      - ./:/app
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    working_dir: /app
    environment:
      - NEXT_PUBLIC_API_URL=
      - INTERNAL_API_BASE_URL=http://backend:8080
      - WATCHPACK_POLLING=true
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
